<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>作者信息</title>
    <style>
        body {width: 100%;min-width: 1200px;background: url(/static/book.jpg) no-repeat center center fixed;-webkit-background-size: cover;-o-background-size: cover;background-size: cover;}
    </style>
</head>
<body>
    <span>
        <input type="button" onclick=location.href=("../guanliyuan") style="width: 60px;margin:20px auto auto 1400px" value="返回" />
    </span>
    <div class="k">
        <p style="text-align:center;font-size:30px;margin-top:10px;margin-bottom:20px;margin-left:-30px">作者信息</p>
        <table width="90%" style="border-collapse:collapse; border-top:2px solid #000000;border-bottom:2px solid #000000;table-layout:fixed;word-break:break-all;margin-left:60px">
            <tr>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black;border-left:none">作者编号</th>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black">姓名</th>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black">电话</th>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black">邮箱</th>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black;border-right:none">地址</th>
            </tr>
            {% for i in au %}
            <tr>
                <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;text-align:center;border-left:none">{{ i.author_id }}</td>
                <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;text-align:center">{{ i.author_name }}</td>
                <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;text-align:center">{{ i.author_phone }}</td>
                <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;text-align:center">{{ i.author_email }}</td>
                <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;text-align:center;border-right:none">{{ i.author_adress }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
