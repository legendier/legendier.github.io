<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>审稿人</title>
    <style>
        body {width: 100%;min-width: 1200px;background: url(/static/book.jpg) no-repeat center center fixed;-webkit-background-size: cover;-o-background-size: cover;background-size: cover;}
        .x {border:1px solid white;width:90%;background-color:#77DDFF;margin:10px auto 0px auto}
        a {text-decoration: none;color:#3232CD ;}
        a:hover{color:blue;}
        .y {border:1px solid white;width:90%;background-color:#77DDFF;margin:10px auto 0px auto}
        .z {border:1px solid white;width:15%;height:200px;background-color:#77DDFF;margin-left:1227px;margin-top:10px;}
        .k {width:74.5%;margin:-200px auto 50px 78px}
    </style>
</head>
<body>
    <div class="x">
        <p style="font-size:60px;font-family:楷体;text-align:center;margin-top:10px;letter-spacing:20px">书当快意读易尽，客有可人期不来</p>
        <p style="font-size:30px;font-family:楷体;text-align:center;margin-top:-40px;">欢迎您,{{ name }}</p>
        <p style="font-size:20px;font-family:楷体;margin:-30px auto 10px 1200px;">{{ time }}</p>
    </div>
    <div class="y">
        <a href="../shenf" style="margin-left:1140px;">我的审稿费</a>
        <a href="../denglu2" style="margin-left:70px">退出登录</a>
    </div>
    <div class="z">
        <p style="margin-left:80px">个人信息</p>
        <p style="margin-left:10px">账号: {{ id }}</p>
        <p style="margin-left:10px">姓名: {{ name }}</p>
        <p style="margin-left:10px">联系电话: {{ phone }}</p>
        <a href="../gai5" style="margin-left:20px;">修改密码</a>
        <a href="../gai6" style="margin-left:20px;">修改个人信息</a>
    </div>
    <div class="k">
        <table width="100%" style="border-collapse:collapse; border-top:2px solid #000000;border-bottom:2px solid #000000;table-layout:fixed;word-break:break-all;">
            <tr>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black;border-left:none">稿件编号</th>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black">标题</th>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black">类型</th>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black">投稿时间</th>
                <th style="padding:80px;padding-top:10px;padding-bottom:10px;border:1px solid black;border-right:none">审稿状态</th>
            </tr>
            {% for i in ar %}
            <form method="POST">
                    <tr>
                        <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;border-left:none;text-align:center">
                            <input type="text" name="id" maxlength="20" style="width:20%;-webkit-appearance:none;-moz-appearance:none;text-align:center;border:none;background-color:#CCEEFF" readonly="readonly"  value={{ i.article_id }} />
                        </td>
                        <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;text-align:center">{{ i.title }}</td>
                        <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;text-align:center">{{ i.type }}</td>
                        <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;text-align:center">{{ i.time|date:"Y-m-d"  }}</td>
                        {% if i.article_id in ll %}
                            <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;border-right:none;text-align:center">已审核</td>
                        {% else %}
                        <td style="padding-top:10px;padding-bottom:10px;border:1px solid black;border-right:none;text-align:center">
                            <input type="submit"  name="submit1" style="width: 60px" value="审核" />
                        </td>
                        {% endif %}
                    </tr>
            </form>
            {% endfor %}
        </table>
</body>
</html>
