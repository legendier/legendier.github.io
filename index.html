<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 隐藏页面滚动条 */
        }
        .video-container {
            position: relative;
            width: 100vw; /* 视口宽度 */
            height: 100vh; /* 视口高度 */
            overflow: hidden;
        }
        .video-container video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover; /* 确保视频覆盖整个容器 */
        }
    </style>

</head>
<body>
   <div class="video-container">
    <video width="100%" height="100%" controls autoplay loop>
        <source src="https://tk.illlt.com:759/api.php?type=小姐姐视频" type="video/mp4">
    </video>
   </div>
</body>
</html>
